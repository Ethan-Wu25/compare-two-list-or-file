<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>List Comparator</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      display: grid;
      gap: 24px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      background: #020617;
      color: var(--text);
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 14px;
      resize: vertical;
      font-size: 14px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 20px rgba(99,102,241,0.35);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(99,102,241,0.55);
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .result h3 {
      margin-top: 0;
      font-size: 16px;
    }

    .list {
      margin: 0;
      padding-left: 0;
      list-style: none;
    }

    .list li {
      padding: 6px 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .only-a { background: rgba(239,68,68,0.15); color: var(--red); }
    .only-b { background: rgba(59,130,246,0.15); color: var(--blue); }
    .both   { background: rgba(34,197,94,0.15); color: var(--green); }
    .union  { background: rgba(99,102,241,0.12); color: #c7d2fe; }

    footer {
      text-align: center;
      margin-top: 30px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>

<body>

  <h1>🔍 List Comparator</h1>

  <div class="container">

    <div class="card inputs">
      <div>
        <h3>List A</h3>
        <textarea id="listA" placeholder="One item per line"></textarea>
      </div>
      <div>
        <h3>List B</h3>
        <textarea id="listB" placeholder="One item per line"></textarea>
      </div>
    </div>

    <div class="actions">
      <button onclick="compare()">Compare Lists</button>
    </div>

    <div class="results">

      <div class="card result">
        <h3>Only in A</h3>
        <ul id="onlyA" class="list"></ul>
      </div>

      <div class="card result">
        <h3>Only in B</h3>
        <ul id="onlyB" class="list"></ul>
      </div>

      <div class="card result">
        <h3>In both A and B</h3>
        <ul id="both" class="list"></ul>
      </div>

      <div class="card result">
        <h3>A or B (Union)</h3>
        <ul id="union" class="list"></ul>
      </div>

    </div>

  </div>

  <footer>Pure HTML · CSS · JavaScript</footer>

  <script>
    function getList(id) {
      return [...new Set(
        document.getElementById(id).value
          .split('\n')
          .map(v => v.trim())
          .filter(Boolean)
      )];
    }

    function render(id, items, className) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        li.className = className;
        el.appendChild(li);
      });
    }

    function compare() {
      const A = getList('listA');
      const B = getList('listB');

      const setA = new Set(A);
      const setB = new Set(B);

      const onlyA = A.filter(x => !setB.has(x));
      const onlyB = B.filter(x => !setA.has(x));
      const both  = A.filter(x => setB.has(x));
      const union = [...new Set([...A, ...B])];

      render('onlyA', onlyA, 'only-a');
      render('onlyB', onlyB, 'only-b');
      render('both', both, 'both');
      render('union', union, 'union');
    }
  </script>

</body>
</html>
